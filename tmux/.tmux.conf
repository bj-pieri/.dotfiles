# install TPM to have acess to tmux plugins https://github.com/tmux-plugins/tpm

###### List of plugins #####

# Colorscheme
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark' # or 'light'
# set active-inactive window styles

# Plugins to enable base16 colors
set -g @plugin 'mattdavis90/base16-tmux'
set -g  default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Nordvpn plugin
set -g @plugin 'maxrodrigo/tmux-nordvpn'
set -g status-right 'NordVPN: #{nordvpn_status_color}#{nordvpn_status} (#{nordvpn_country})'

# Change the prefix to Alt+a
unbind C-a
set -g prefix M-a

# Fixing scape time 
set -sg escape-time 0

# Enable mouse
set -g mouse on

run '~/.tmux/plugins/tpm/tpm'
run-shell ~/.tmux/tmux-nordvpn/nordvpn.tmux


